apiVersion: apps/v1
kind: Deployment
metadata:
  name: citypulse-frontend
  labels:
    app: citypulse-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: citypulse-frontend
  template:
    metadata:
      labels:
        app: citypulse-frontend
    spec:
      containers:
      - name: frontend
        image: meghdoshi/citypulse-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_SUPABASE_URL
          valueFrom:
            configMapKeyRef:
              name: citypulse-config
              key: supabase-url
        - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
          valueFrom:
            configMapKeyRef:
              name: citypulse-config
              key: supabase-anon-key
---
apiVersion: v1
kind: Service
metadata:
  name: citypulse-frontend-service
spec:
  selector:
    app: citypulse-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
